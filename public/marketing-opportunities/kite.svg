<svg width="220" height="240" viewBox="0 0 220 240" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Kite -->
  <g transform="translate(40 10) rotate(10 70 70)">
    <rect
      x="20"
      y="20"
      width="100"
      height="100"
      fill="#F7F6F3"
      stroke="#575A83"
      stroke-width="6"
      transform="rotate(45 70 70)"
    />

    <!-- Eyes -->
    <circle cx="58" cy="68" r="5" fill="#575A83"/>
    <circle cx="90" cy="68" r="5" fill="#575A83"/>

    <circle cx="56" cy="66" r="1.5" fill="white"/>
    <circle cx="88" cy="66" r="1.5" fill="white"/>

    <!-- Eyebrows -->
    <path d="M50 55 Q58 50 66 55" stroke="#575A83" stroke-width="5" stroke-linecap="round"/>
    <path d="M82 55 Q90 50 98 55" stroke="#575A83" stroke-width="5" stroke-linecap="round"/>

    <!-- Smile -->
    <path
      d="M60 92 Q74 106 88 92"
      stroke="#575A83"
      stroke-width="5"
      stroke-linecap="round"
      fill="none"
    />
  </g>

  <!-- Tail -->
  <path
    d="M110 135
       C130 160 145 180 120 195
       C95 210 110 225 135 230"
    stroke="#32A8E0"
    stroke-width="8"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Tail bows -->
  <circle cx="126" cy="185" r="6" fill="#575A83"/>
  <circle cx="136" cy="205" r="6" fill="#575A83"/>

  <!-- Sparkles -->
  <g stroke="#575A83" stroke-width="2">
    <path d="M170 35L170 45"/>
    <path d="M165 40L175 40"/>

    <path d="M185 55L185 65"/>
    <path d="M180 60L190 60"/>

    <path d="M155 60L155 68"/>
    <path d="M151 64L159 64"/>
  </g>

</svg>